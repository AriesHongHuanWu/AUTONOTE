<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <title>AutoNote</title>
</head>

<body>
  <div id="root"></div>
  <!-- Sherpa-ONNX WebAssembly Loaders -->
  <script>
    window.Module = {
      locateFile: function (path, scriptDirectory) {
        if (path.endsWith('.data')) {
          return 'https://huggingface.co/spaces/k2-fsa/web-assembly-asr-sherpa-onnx-zh-en/resolve/main/' + path;
        }
        if (path.endsWith('.wasm')) {
          return 'https://huggingface.co/spaces/k2-fsa/web-assembly-asr-sherpa-onnx-zh-en/resolve/main/' + path;
        }
        return scriptDirectory + path;
      },
      setStatus: function (status) {
        if (!status) return;

        let displayStatus = status;

        // Emscripten default status texts look like: "Downloading data... (12345/67890)"
        const match = status.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (match) {
          const loaded = parseInt(match[2]);
          const total = parseInt(match[4]);
          const percent = ((loaded / total) * 100).toFixed(1);
          displayStatus = `Downloading AI Model... ${percent}%`;
        }

        window.dispatchEvent(new CustomEvent('sherpa-status', { detail: displayStatus }));
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        window.Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      },
      onRuntimeInitialized: function () {
        console.log('Sherpa-ONNX Runtime initialized');
        window.Module.isReady = true;
        window.dispatchEvent(new Event('sherpa-ready'));
      }
    };
  </script>
  <!-- Fetch Sherpa-ONNX from Hugging Face Space CDN -->
  <script
    src="https://huggingface.co/spaces/k2-fsa/web-assembly-asr-sherpa-onnx-zh-en/resolve/main/sherpa-onnx-asr.js"></script>
  <script
    src="https://huggingface.co/spaces/k2-fsa/web-assembly-asr-sherpa-onnx-zh-en/resolve/main/sherpa-onnx-wasm-main-asr.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
